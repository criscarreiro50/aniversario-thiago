<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Painel · Confirmações — Thiago Valério</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root{
      --cream:#F0ECE1; --field:#E7E2D5; --ink:#121212;
      --red:#C0392B; --green:#2FAE66; --muted:#8C8A85;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;background:var(--field);color:var(--ink);
      font-family:"DM Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased;
      display:flex;align-items:flex-start;justify-content:center;padding:28px 16px;
    }
    .wrap{width:100%;max-width:480px}

    /* ---------- LOGIN ---------- */
    #login{
      background:var(--cream);border:1px solid rgba(18,18,18,.06);border-radius:20px;
      padding:36px 30px;text-align:center;margin-top:8vh;
    }
    .eyebrow{font-size:12px;letter-spacing:.22em;color:var(--red);font-weight:700;text-transform:uppercase;margin-bottom:10px}
    .login-titulo{font-family:"Anton",sans-serif;font-size:1.9rem;color:var(--ink);line-height:1;margin-bottom:22px}
    .campo{text-align:left;margin-bottom:14px}
    .campo label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#3A3A3A;margin-bottom:6px}
    .campo input{width:100%;padding:14px 15px;border:1.5px solid #D8D2C4;border-radius:12px;background:#fff;font-size:16px;font-family:"DM Sans",sans-serif;color:var(--ink)}
    .campo input:focus{outline:none;border-color:var(--ink)}
    .btn{
      width:100%;padding:16px;background:var(--red);color:#fff;border:none;border-radius:14px;
      font-family:"Anton",sans-serif;font-size:1.1rem;letter-spacing:.02em;cursor:pointer;margin-top:4px;
    }
    .btn[disabled]{opacity:.6;cursor:default}
    .login-erro{display:none;color:var(--red);font-size:13px;margin-top:12px}
    .login-erro.show{display:block}

    /* ---------- DASHBOARD ---------- */
    #painel{display:none}
    .topo{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .topo .marca{font-size:13px;font-weight:700;letter-spacing:.02em;color:var(--ink)}
    .topo .marca b{color:var(--red)}
    .sair{background:none;border:none;color:var(--muted);font-family:"DM Sans",sans-serif;font-size:13px;font-weight:700;cursor:pointer;text-decoration:underline}

    .destaque{
      background:var(--ink);border-radius:20px;padding:32px 24px;text-align:center;margin-bottom:16px;position:relative;overflow:hidden;
    }
    .destaque .cruz{position:absolute;top:50%;left:50%;width:220px;height:220px;transform:translate(-50%,-50%);fill:#fff;opacity:.05;pointer-events:none}
    .destaque .num{font-family:"Anton",sans-serif;font-size:clamp(4.5rem,22vw,6.5rem);color:#fff;line-height:.9;position:relative}
    .destaque .lbl{position:relative;font-size:13px;letter-spacing:.28em;text-transform:uppercase;color:#9A978F;font-weight:700;margin-top:6px}
    .ao-vivo{position:relative;display:inline-flex;align-items:center;gap:7px;margin-top:14px;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#7Fca9a;font-weight:700}
    .ao-vivo .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pisca 1.8s ease-in-out infinite}
    @keyframes pisca{0%,100%{opacity:1}50%{opacity:.25}}

    .busca{position:relative;margin-bottom:12px}
    .busca input{width:100%;padding:14px 15px 14px 42px;border:1.5px solid #D8D2C4;border-radius:12px;background:var(--cream);font-size:15px;font-family:"DM Sans",sans-serif;color:var(--ink)}
    .busca input:focus{outline:none;border-color:var(--ink)}
    .busca svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}

    .lista{background:var(--cream);border:1px solid rgba(18,18,18,.06);border-radius:16px;overflow:hidden}
    .item{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid rgba(18,18,18,.06)}
    .item:last-child{border-bottom:none}
    .item .nome{font-weight:700;font-size:15px;color:var(--ink)}
    .item .quando{font-size:12px;color:var(--muted);white-space:nowrap}
    .item.novo{animation:entra .5s ease}
    @keyframes entra{from{background:#DDEFE3}to{background:transparent}}
    .vazio{padding:26px 18px;text-align:center;color:var(--muted);font-size:14px}

    @media(prefers-reduced-motion:reduce){.ao-vivo .dot,.item.novo{animation:none}}
  </style>
</head>
<body>
  <div class="wrap">

    <!-- ================= LOGIN ================= -->
    <section id="login">
      <p class="eyebrow">Painel privado</p>
      <h1 class="login-titulo">Confirmações<br>do aniversário</h1>
      <form id="form-login">
        <div class="campo">
          <label for="email">E-mail</label>
          <input type="email" id="email" autocomplete="username" required />
        </div>
        <div class="campo">
          <label for="senha">Senha</label>
          <input type="password" id="senha" autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn" id="btn-entrar">ENTRAR</button>
        <p class="login-erro" id="login-erro">E-mail ou senha incorretos.</p>
      </form>
    </section>

    <!-- ================= PAINEL ================= -->
    <section id="painel">
      <div class="topo">
        <span class="marca"><b>Thiago Valério</b> · confirmações</span>
        <button class="sair" id="sair">sair</button>
      </div>

      <div class="destaque">
        <svg class="cruz" viewBox="0 0 100 100" aria-hidden="true"><path d="M50,50 L38,4 L50,18 L62,4 Z M50,50 L96,38 L82,50 L96,62 Z M50,50 L62,96 L50,82 L38,96 Z M50,50 L4,62 L18,50 L4,38 Z"/></svg>
        <div class="num" id="total">0</div>
        <div class="lbl">confirmados</div>
        <div class="ao-vivo"><span class="dot"></span> ao vivo</div>
      </div>

      <div class="busca">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.3-4.3"/></svg>
        <input type="text" id="busca" placeholder="Buscar por nome..." />
      </div>

      <div class="lista" id="lista">
        <div class="vazio" id="vazio">Carregando...</div>
      </div>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    /* ================= CONFERIR / PREENCHER ================= */
    var SUPABASE_URL = "https://rgbfbrnwynbpbcqxexon.supabase.co";
    var SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnYmZicm53eW5icGJjcXhleG9uIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDgzNjUsImV4cCI6MjA5NTM4NDM2NX0.1KaV9VjMUcWk5RqrEhAJOZtYfbGbpCBujPXiVTS40Bo"; // mesma anon key da página de confirmação
    /* ======================================================= */

    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    var registros = []; // {nome, criado_em}

    /* ---- login ---- */
    document.getElementById("form-login").addEventListener("submit", async function(e){
      e.preventDefault();
      var btn = document.getElementById("btn-entrar");
      var erro = document.getElementById("login-erro");
      erro.classList.remove("show");
      btn.disabled = true; btn.textContent = "ENTRANDO...";
      var { error } = await sb.auth.signInWithPassword({
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("senha").value
      });
      btn.disabled = false; btn.textContent = "ENTRAR";
      if (error) { erro.classList.add("show"); return; }
      abrirPainel();
    });

    document.getElementById("sair").addEventListener("click", async function(){
      await sb.auth.signOut();
      location.reload();
    });

    /* ---- sessão persistente: já logado? ---- */
    sb.auth.getSession().then(function(res){
      if (res.data.session) abrirPainel();
    });

    async function abrirPainel(){
      document.getElementById("login").style.display = "none";
      document.getElementById("painel").style.display = "block";
      await carregar();
      assinarAoVivo();
    }

    /* ---- carregar dados ---- */
    async function carregar(){
      var { data, error } = await sb
        .from("confirmacoes_aniversario")
        .select("nome, criado_em")
        .order("criado_em", { ascending: false });
      if (error) { document.getElementById("vazio").textContent = "Erro ao carregar."; return; }
      registros = data || [];
      render();
    }

    /* ---- tempo real ---- */
    function assinarAoVivo(){
      sb.channel("conf-aovivo")
        .on("postgres_changes",
          { event: "INSERT", schema: "public", table: "confirmacoes_aniversario" },
          function(payload){
            registros.unshift({ nome: payload.new.nome, criado_em: payload.new.criado_em });
            render(payload.new.nome);
          })
        .subscribe();
    }

    /* ---- busca ---- */
    document.getElementById("busca").addEventListener("input", function(){ render(); });

    /* ---- render ---- */
    function normaliza(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
    function tempoRel(iso){
      var d = new Date(iso), agora = new Date(), s = Math.floor((agora - d)/1000);
      if (s < 60) return "agora";
      if (s < 3600) return "há " + Math.floor(s/60) + " min";
      if (s < 86400) return "há " + Math.floor(s/3600) + "h";
      return d.toLocaleDateString("pt-BR", { day:"2-digit", month:"2-digit" });
    }
    function render(destacar){
      var termo = normaliza(document.getElementById("busca").value);
      document.getElementById("total").textContent = registros.length;
      var filtrados = termo ? registros.filter(function(r){ return normaliza(r.nome).indexOf(termo) !== -1; }) : registros;
      var lista = document.getElementById("lista");
      if (!filtrados.length){
        lista.innerHTML = '<div class="vazio">' + (termo ? "Ninguém com esse nome." : "Nenhuma confirmação ainda.") + '</div>';
        return;
      }
      lista.innerHTML = filtrados.map(function(r){
        var novo = (r.nome === destacar) ? " novo" : "";
        return '<div class="item' + novo + '"><span class="nome">' + escapar(r.nome) + '</span><span class="quando">' + tempoRel(r.criado_em) + '</span></div>';
      }).join("");
    }
    function escapar(s){ var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }
  </script>
</body>
</html>
